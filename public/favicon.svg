<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 포켓볼 위쪽 빨간 반원 -->
  <path d="M 10 50 A 40 40 0 0 1 90 50 Z" fill="#FF5959"/>
  <!-- 포켓볼 아래쪽 흰 반원 -->
  <path d="M 10 50 A 40 40 0 0 0 90 50 Z" fill="white"/>
  <!-- 테두리 원 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#333" stroke-width="5"/>
  <!-- 가운데 가로선 -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#333" stroke-width="5"/>
  <!-- 가운데 작은 원 (흰색) -->
  <circle cx="50" cy="50" r="10" fill="white" stroke="#333" stroke-width="5"/>
</svg>